name: Populate Sealed Images

on:
  workflow_dispatch:

  schedule:
    - cron: '0 14 * * 1' # 9:00 AM Eastern (EDT) every Monday

jobs:
  populate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run sealed images script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/populate-sealed-images.js
