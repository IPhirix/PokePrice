name: Populate ETB Catalog

on:
  workflow_dispatch:
    inputs:
      upload_images:
        description: 'Upload images to Supabase Storage (requires SUPABASE_SERVICE_ROLE_KEY secret)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  populate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run ETB catalog script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.upload_images }}" = "true" ]; then
            node scripts/import-prices/populate-etb-catalog.js --upload-images
          else
            node scripts/import-prices/populate-etb-catalog.js
          fi
