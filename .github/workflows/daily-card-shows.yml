name: Daily Card Shows Scraper

on:
  workflow_dispatch:

  schedule:
    - cron: '0 14 * * *'

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r scripts/card-shows/requirements.txt

      - name: Run Card Shows Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/card-shows/card_shows_scraper.py
